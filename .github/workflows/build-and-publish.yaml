name: Build and Publish

on:
  push:
    tags:
      - "v*"
  # Manual re-run. Unlike a plain `--ref <tag>` dispatch (which would run
  # whatever workflow definition is checked in at that tag -- e.g. an old
  # version missing a bugfix made after the tag was cut), this is meant to
  # be dispatched with `--ref main` so the *current* workflow definition on
  # main always runs, and the `tag` input says which release to (re-)act
  # on. `env.RELEASE_TAG` below resolves to that input on workflow_dispatch
  # or to `github.ref_name` on a real tag push, so every job/step that
  # needs "the tag being published" reads one place instead of assuming
  # `github.ref_name` is meaningful in both trigger types.
  #
  # publish-crates guards itself against re-publishing a version that's
  # already on crates.io, so a full re-run is safe even after a partial
  # success; publish-release's `--clobber` makes re-uploading release
  # assets safe too.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re-)publish, e.g. v0.2.0 -- dispatch this against --ref main so the current workflow definition runs"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}--${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  rust-test:
    uses: ./.github/workflows/wc-rust-test.yaml
    secrets: inherit

  build:
    needs: [rust-test]
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl targets are statically linked, so the published binary runs
          # on any Linux regardless of the host glibc version — the gnu
          # binaries require the builder's glibc (currently 2.39 from
          # ubuntu-latest) or newer, which broke on older self-hosted runners.
          # gnu is kept for callers that still pull those asset names directly.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      # Explicit ref: on workflow_dispatch (typically run with --ref main
      # so the current workflow definition is used, see the top-level
      # comment), the default checkout would build main's HEAD rather than
      # the actual release tag's content. RELEASE_TAG resolves correctly
      # for both trigger types.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      # Sets up the cross linker/CC for every Linux target except the native
      # host (x86_64-gnu): aarch64-gnu (cross) plus both musl targets, whose
      # C dependency (ring) needs a musl-capable compiler. Replaces the
      # previous hand-rolled apt step, which only handled aarch64-gnu.
      - name: Setup cross toolchain
        if: contains(matrix.target, 'linux') && matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: build-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p rinkaku

      - name: Package binary
        run: |
          BINARY_NAME=rinkaku
          ARCHIVE_NAME="${BINARY_NAME}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          cp README.md LICENSE "${ARCHIVE_NAME}/" 2>/dev/null || true
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  publish-release:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist

      - name: List distribution files
        run: ls -lh dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --clobber makes this safe to re-run via workflow_dispatch
          # against a tag whose assets were already uploaded.
          gh release upload "${{ env.RELEASE_TAG }}" dist/* \
            --repo "${{ github.repository }}" \
            --clobber

  publish-crates:
    needs: [rust-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # See the `build` job's checkout step: same reasoning for pinning
      # ref explicitly rather than trusting the default (main) checkout.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: publish-crates

      # Makes this job idempotent so workflow_dispatch (or a build
      # rerun) can safely repeat it after a partial release failure:
      # crates.io rejects re-publishing an existing version, so skip
      # ahead instead of letting `cargo publish` fail the whole job.
      #
      # Published-version checks use the crates.io *sparse index*
      # (index.crates.io) rather than the crates.io API
      # (crates.io/api/v1/crates/...): the API requires a compliant
      # User-Agent header and returns 403 without one (see
      # https://crates.io/data-access), which previously made this guard
      # always read "not published" and `cargo publish` fail with "crate
      # already exists". The sparse index has no such requirement. Index
      # path layout for a crate name of 4+ characters is
      # `{name[0:2]}/{name[2:4]}/{name}` (both `rinkaku` and
      # `rinkaku-core` fall in this case); each line of the response body
      # is one published version as a JSON object containing `"vers":
      # "X.Y.Z"`. A 404 (crate not published at all yet) also means "not
      # published" for our purposes, so no special-casing needed --
      # `grep` simply won't match either way.
      - name: Check whether rinkaku-core is already published
        id: check-core
        run: |
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "rinkaku-core") | .version')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sf "https://index.crates.io/ri/nk/rinkaku-core" \
              | grep -q "\"vers\":\"${version}\""; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # rinkaku-core must publish first: rinkaku depends on it by version,
      # and crates.io resolves that dependency from the registry, not the
      # workspace's local path.
      - name: Publish rinkaku-core
        if: steps.check-core.outputs.already_published == 'false'
        run: cargo publish -p rinkaku-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      # crates.io needs a short window to index rinkaku-core before
      # rinkaku-tui's publish can resolve it as a dependency. Only needed
      # right after an actual publish, not when we skipped above.
      - name: Wait for rinkaku-core to be indexed
        if: steps.check-core.outputs.already_published == 'false'
        run: sleep 30

      # rinkaku-tui must publish before rinkaku for the same reason
      # rinkaku-core does: rinkaku depends on rinkaku-tui by version, and
      # crates.io resolves that dependency from the registry, not from
      # the workspace path. Same check-then-publish-then-wait pattern as
      # rinkaku-core above.
      - name: Check whether rinkaku-tui is already published
        id: check-tui
        run: |
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "rinkaku-tui") | .version')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sf "https://index.crates.io/ri/nk/rinkaku-tui" \
              | grep -q "\"vers\":\"${version}\""; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish rinkaku-tui
        if: steps.check-tui.outputs.already_published == 'false'
        run: cargo publish -p rinkaku-tui --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for rinkaku-tui to be indexed
        if: steps.check-tui.outputs.already_published == 'false'
        run: sleep 30

      - name: Check whether rinkaku is already published
        id: check-bin
        run: |
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "rinkaku") | .version')
          if curl -sf "https://index.crates.io/ri/nk/rinkaku" \
              | grep -q "\"vers\":\"${version}\""; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish rinkaku
        if: steps.check-bin.outputs.already_published == 'false'
        run: cargo publish -p rinkaku --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-homebrew:
    needs: [publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Scoped installation token for the tap repo, distinct from the
      # release-please job's tibdex/github-app-token: this uses the
      # official actions/create-github-app-token action instead, scoped
      # to hiro-o918/homebrew-tap only (the App must be installed there).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.THIS_GITHUB_APP_ID }}
          private-key: ${{ secrets.THIS_GITHUB_APP_PRIVATE_KEY }}
          owner: hiro-o918
          repositories: homebrew-tap

      # x86_64-apple-darwin is the tarball macOS Homebrew installs from
      # (see awsctx's homebrew-release.yml, same convention).
      #
      # push-to is set explicitly to hiro-o918/homebrew-tap: without it,
      # the action decides whether to fork by checking
      # `repos.get(homebrew-tap).permissions.push` on the token, and a
      # GitHub App installation token doesn't populate that field the
      # way the action expects. That made it treat the token as
      # read-only and attempt `POST /repos/.../forks`, which the App
      # isn't permitted to do (HTTP 403). Declaring push-to short-
      # circuits that permission probe and pushes directly, matching
      # the actual (write) access the token has.
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: rinkaku
          formula-path: Formula/rinkaku.rb
          push-to: hiro-o918/homebrew-tap
          homebrew-tap: hiro-o918/homebrew-tap
          base-branch: main
          tag-name: ${{ env.RELEASE_TAG }}
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/rinkaku-x86_64-apple-darwin.tar.gz
        env:
          COMMITTER_TOKEN: ${{ steps.app-token.outputs.token }}
